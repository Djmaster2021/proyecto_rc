{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contraseña actualizada · RC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'accounts/styles.css' %}">
</head>
<body class="rc-auth-body rc-auth-body--reset">
  <header class="rc-auth-header">
    <div class="rc-auth-brand">
      <div class="rc-logo">RC</div>
      <span class="rc-brand-text">Consultorio Dental RC</span>
    </div>
    <nav class="rc-auth-nav">
      <a href="{% url 'accounts:login' %}">Iniciar sesión</a>
      <span>·</span>
      <a href="{% url 'accounts:register' %}">Registrarse</a>
    </nav>
    <button class="rc-theme-toggle" id="authThemeToggle" type="button">
      <span>Oscuro</span>
    </button>
  </header>

  <main class="rc-auth-main">
    <section class="rc-auth-card rc-auth-card--robot">
      <div class="rc-robot rc-robot--happy">
        <div class="rc-robot-antenna"></div>
        <div class="rc-robot-head">
          <div class="rc-robot-eye rc-robot-eye--left"></div>
          <div class="rc-robot-eye rc-robot-eye--right"></div>
          <div class="rc-robot-mouth rc-robot-mouth--big-smile"></div>
        </div>
        <div class="rc-robot-shadow"></div>
      </div>

      <div class="rc-auth-content">
        <h1 class="rc-auth-title">¡Listo!</h1>
        <p class="rc-auth-subtitle">
          Tu contraseña fue actualizada correctamente.  
          Ya puedes entrar de nuevo al consultorio digital.
        </p>

        <a href="{% url 'accounts:login' %}" class="rc-btn rc-btn--primary rc-btn--full rc-btn--center">
          Ir al inicio de sesión
        </a>
      </div>
    </section>
  </main>

  <footer class="rc-auth-footer">© Consultorio Rodolfo Castellón</footer>
  <script src="{% static 'accounts/app.js' %}"></script>
</body>
</html>
