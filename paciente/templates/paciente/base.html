{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  
  <title>{% block ptitle %}Consultorio RC{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'paciente/styles.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  {% block extra_css %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="brand">RC</div>
      
      <div class="center-title">
        {% block header_title %}Paciente{% endblock %}
      </div>
      
      <div class="right-actions">
        <a href="{% url 'accounts:logout' %}" class="btn-logout">
            Cerrar sesión
        </a>

        <div class="theme-switcher">
          <label class="theme-switch" for="theme-toggle">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    {% block pcontent %}{% endblock %}
  </main>

  <div id="modal" class="modal-backdrop" hidden>
    <div class="modal-content">
      <header class="modal-header">
        <h3 id="modal-title" class="modal-title"></h3>
        <button class="modal-close" id="modalCloseBtn" aria-label="Cerrar formulario">✕</button>
      </header>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>
    
  <script src="{% static 'paciente/app.js' %}" defer></script>
  {% block extra_js %}{% endblock %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/card/2.5.4/card.min.js"></script>
</body>
</html>
