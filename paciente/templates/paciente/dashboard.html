<div class="cyber-card">
  <h2 class="card-title">Mi Perfil</h2>
  <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
    <img id="perfil-img" src="https://ui-avatars.com/api/?name={{ user.first_name }}+{{ user.last_name }}&background=0D8ABC&color=fff&size=128" alt="Perfil" style="border-radius: 50%; border: 2px solid var(--color-primary); width: 80px; height: 80px; object-fit: cover;">
    <div>
       <p><strong>Folio:</strong> <span id="perfil-id">PAC-{{ paciente.id|stringformat:"04d" }}</span></p>
      <p><strong>Nombre:</strong> <span>{{ user.get_full_name }}</span></p>
      <p><strong>Email:</strong> <span>{{ user.email }}</span></p>
    </div>
  </div>
  <p><strong>Teléfono:</strong> <span>{{ paciente.telefono|default:"-- No registrado --" }}</span></p>
  <p><strong>Dirección:</strong> <span>{{ paciente.direccion|default:"-- Sin dirección --" }}</span></p>
  
  <div style="margin-top: 1.5rem;">
    <button id="btn-editar-perfil" class="cyber-btn">Editar Perfil</button>
  </div>
</div>
